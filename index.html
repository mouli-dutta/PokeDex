<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pd-red: #cc1414;
      --pd-red-hi: #ef4141;
      --pd-red-lo: #8f0000;
      --pd-red-shadow: #5e0000;
      --bezel: #181818;
      --bezel-hi: #3c3c3c;
      --lcd-bg: #eef4e4;
      --lcd-line: rgba(0,0,0,0.05);
      --gold: #ffcf3f;
      --led-off: #3a3a3a;

      --t-normal:#a8a878; --t-fire:#f08030; --t-water:#6890f0; --t-electric:#f0c419;
      --t-grass:#78c850; --t-ice:#98d8d8; --t-fighting:#c03028; --t-poison:#a040a0;
      --t-ground:#e0c068; --t-flying:#a890f0; --t-psychic:#f85888; --t-bug:#a8b820;
      --t-rock:#b8a038; --t-ghost:#705898; --t-dragon:#7038f8; --t-dark:#705848;
      --t-steel:#b8b8d0; --t-fairy:#ee99ac;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, #2a2a2a 0%, #111 60%),
        linear-gradient(135deg, #1a1a1a 0%, #0c0c0c 100%);
      font-family: 'VT323', 'Courier New', monospace;
      padding: 10px;
    }

    /* ===== Pokédex Boot Loader ===== */
    #bootLoader {
      position: fixed;
      transition: opacity 0.5s ease;
      inset: 0;
      background: radial-gradient(circle, #222 0%, #000 70%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .boot-pokeball {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(#d30000 50%, white 50%);
      border: 4px solid #000;
      position: relative;
      animation: bootShake 0.8s infinite;
    }

    .boot-pokeball::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 6px;
      background: black;
      transform: translateY(-50%);
    }

    .boot-pokeball::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18px;
      height: 18px;
      background: white;
      border: 4px solid black;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .boot-text {
      margin-top: 18px;
      font-size: 12px;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      letter-spacing: 1px;
      opacity: 0.85;
    }

    @keyframes bootShake {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(-12deg); }
      50%  { transform: rotate(12deg); }
      75%  { transform: rotate(-12deg); }
      100% { transform: rotate(0deg); }
    }

    @media (max-width: 768px) { body { padding: 5px; } }

    /* ===== Device shell ===== */
    .device-shell {
      display: flex;
      align-items: stretch;
      max-width: 420px;
      width: 100%;
      filter: drop-shadow(0 25px 50px rgba(0,0,0,0.6));
    }

    .hinge {
      width: 16px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #700 0%, #500 50%, #700 100%);
      border-radius: 8px 0 0 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      align-items: center;
      padding: 14px 0;
      box-shadow: inset 2px 0 4px rgba(0,0,0,0.5);
    }

    .hinge-rivet {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #999, #222);
      box-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }

    @media (max-width: 480px) { .hinge { width: 10px; } .hinge-rivet { width: 6px; height: 6px; } }

    .device-container {
      flex: 1;
      min-width: 0;
      aspect-ratio: 3 / 4.3;
      background:
        linear-gradient(155deg, var(--pd-red-hi) 0%, var(--pd-red) 45%, var(--pd-red-lo) 100%);
      border-radius: 0 28px 28px 18px;
      padding: 18px 18px 14px;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.25),
        inset 0 -30px 40px rgba(0,0,0,0.15),
        0 0 0 3px var(--pd-red-shadow);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      .device-container { border-radius: 0 16px 16px 10px; padding: 12px 12px 10px; }
    }

    /* screw details for authenticity */
    .device-container::after {
      content: '';
      position: absolute;
      top: 14px; right: 14px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffb3b3, #7a0000);
      box-shadow: 0 1px 2px rgba(0,0,0,0.5), 60px 250px 0 rgba(0,0,0,0), 0 300px 0 rgba(255,179,179,0);
    }

    .top-section {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 12px;
      padding: 2px 4px 0;
    }

    .lens-wrap {
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
    }

    .lens-ring {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f4f4f4, #cfcfcf);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 -2px 4px rgba(0,0,0,0.2);
    }

    .lens {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, #d9ecff 0%, #7fb3ee 35%, #2d5da6 70%, #163a6e 100%);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 0 10px rgba(50,100,200,0.5);
      position: relative;
      transition: box-shadow 0.3s ease;
    }

    .lens::after {
      content: '';
      position: absolute;
      top: 18%; left: 22%;
      width: 30%; height: 18%;
      background: rgba(255,255,255,0.75);
      border-radius: 50%;
      filter: blur(1px);
    }

    .lens-wrap:hover .lens { box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 0 16px rgba(120,180,255,0.9); }

    .lens.scanning {
      animation: lensPulse 0.9s ease-in-out infinite;
    }

    @keyframes lensPulse {
      0%, 100% { box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 0 10px rgba(255,60,60,0.6); }
      50% { box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 0 26px rgba(255,60,60,0.95); }
    }

    .lens.speaking {
      animation: lensSpeak 0.55s ease-in-out infinite;
    }

    @keyframes lensSpeak {
      0%, 100% { box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 0 10px rgba(90,160,255,0.6); filter: brightness(1); }
      50% { box-shadow: inset 0 3px 8px rgba(0,0,0,0.4), 0 0 28px rgba(90,190,255,1); filter: brightness(1.35); }
    }

    .lens-hint {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Press Start 2P', cursive;
      font-size: 6px;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      .lens-ring { width: 50px; height: 50px; }
      .lens { width: 40px; height: 40px; }
      .lens-hint { font-size: 5px; bottom: -13px; }
    }

    .status-col { display: flex; flex-direction: column; gap: 8px; flex: 1; padding-top: 4px; }

    .led-indicators { display: flex; gap: 10px; }

    .led {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #666, var(--led-off));
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .led.power {
      animation: powerBlink 2.6s ease-in-out infinite;
    }

    @keyframes powerBlink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.55; }
    }

    @media (max-width: 480px) { .led { width: 12px; height: 12px; } .led-indicators { gap: 8px; } }

    .speaker-grille {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 14px;
    }
    .speaker-grille span { transform-origin: bottom center; }

    .speaker-grille.active span {
      animation: eqBounce 0.45s ease-in-out infinite alternate;
    }
    .speaker-grille.active span:nth-child(2n) { animation-delay: 0.08s; }
    .speaker-grille.active span:nth-child(3n) { animation-delay: 0.16s; }
    .speaker-grille.active span:nth-child(4n) { animation-delay: 0.24s; }

    @keyframes eqBounce {
      from { transform: scaleY(0.35); opacity: 0.7; }
      to   { transform: scaleY(1); opacity: 1; }
    }
    .speaker-grille span {
      width: 3px;
      background: rgba(0,0,0,0.35);
      border-radius: 1px;
    }
    .speaker-grille span:nth-child(1){height:60%;}
    .speaker-grille span:nth-child(2){height:100%;}
    .speaker-grille span:nth-child(3){height:75%;}
    .speaker-grille span:nth-child(4){height:100%;}
    .speaker-grille span:nth-child(5){height:50%;}
    .speaker-grille span:nth-child(6){height:90%;}
    .speaker-grille span:nth-child(7){height:65%;}
    .speaker-grille span:nth-child(8){height:100%;}
    .speaker-grille span:nth-child(9){height:55%;}

    .screen-container {
      background: var(--bezel);
      border: 10px solid var(--bezel);
      border-radius: 6px;
      padding: 12px;
      box-shadow:
        0 0 0 2px var(--bezel-hi),
        inset 0 4px 10px rgba(0,0,0,0.6),
        0 2px 4px rgba(0,0,0,0.3);
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      perspective: 1000px;
      gap: 10px;
      min-height: 0;
    }

    .screen-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      color: var(--gold);
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .screen-topbar .no-tag { color: #9fe89f; }

    .image-flip-container {
      flex: 1;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease-in-out;
      min-height: 0;
    }

    .image-flip-container.flipped { transform: rotateY(180deg); }

    .image-front,
    .image-back {
      width: 100%;
      height: 100%;
      position: absolute;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 3px;
    }

    .image-front { z-index: 2; }
    .image-back { transform: rotateY(180deg); z-index: 1; }

    .pokemon-image-area {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--lcd-bg);
      border-radius: 3px;
      border: 1px solid #33421f;
      position: relative;
      overflow: hidden;
    }

    .pokemon-image-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      z-index: 3;
    }

    .pokemon-image {
      width: 82%;
      height: 82%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 6px 6px rgba(0,0,0,0.15));
    }

    .loading {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      color: #666;
      background: rgba(238,244,228,0.85);
      z-index: 4;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex-shrink: 0;
    }

    .search-box {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .search-box input {
      grid-column: span 3;
      width: 100%;
      padding: 6px 8px;
      border: 2px solid #333;
      border-radius: 3px;
      font-size: 14px;
      font-family: 'VT323', monospace;
      outline: none;
      background: #fff;
      color: #000;
      min-height: 40px;
    }

    .search-box input:focus {
      border-color: #fff;
      box-shadow: 0 0 4px rgba(255,255,255,0.7);
    }

    .search-box button { grid-column: span 1; width: 100%; }

    @media (max-width: 480px) {
      .search-box input { font-size: 16px; padding: 10px 12px; min-height: 44px; }
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .button-row.dpad-row { grid-template-columns: repeat(2, 1fr); }

    button {
      padding: 7px 4px;
      background: linear-gradient(180deg, #8b8b8b 0%, #5a5a5a 100%);
      color: #fff;
      border: 3px solid #2f2f2f;
      border-radius: 3px;
      font-size: 7.5px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 0 #222, 0 6px 8px rgba(0,0,0,0.4);
      text-transform: uppercase;
      font-family: 'Press Start 2P', cursive;
      position: relative;
      min-height: 40px;
      line-height: 1.3;
    }

    button:hover {
      background: linear-gradient(180deg, #9a9a9a 0%, #6a6a6a 100%);
      box-shadow: 0 4px 0 #222, 0 8px 12px rgba(0,0,0,0.5);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #222, 0 3px 4px rgba(0,0,0,0.3);
    }

    button#scanBtn { background: linear-gradient(180deg, #4d7fd4 0%, #2d5da6 100%); border-color: #1c3a68; box-shadow: 0 4px 0 #142a4c, 0 6px 8px rgba(0,0,0,0.4); }
    button#scanBtn:hover { background: linear-gradient(180deg, #5c8ee0 0%, #3a6cbb 100%); }

    button#searchBtn { background: linear-gradient(180deg, var(--pd-red-hi), var(--pd-red)); border-color: #7a0000; box-shadow: 0 4px 0 #5e0000, 0 6px 8px rgba(0,0,0,0.4);}

    .details-section {
      background: linear-gradient(135deg, #a8c8e8 0%, #7fa8d8 50%, #5888c8 100%);
      border-radius: 3px;
      border: 1px solid #33421f;
      font-size: 9px;
      color: #1a3a5a;
      padding: 12px;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      align-content: start;
      overflow-y: auto;
      font-family: 'Press Start 2P', cursive;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
      position: relative;
    }

    @media (max-width: 480px) {
      .details-section { font-size: 7px; padding: 10px; gap: 6px 8px; }
    }

    .details-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
    }

    .detail-item { position: relative; z-index: 1; line-height: 1.4; }
    .detail-item.full { grid-column: 1 / -1; }
    .detail-label { font-weight: bold; color: #0a2a4a; display: inline; text-shadow: 0 0 3px rgba(168,200,232,0.8); }
    .detail-value { word-break: break-word; color: #2a4a6a; display: inline; margin-left: 4px; }

    .type-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      color: #fff;
      font-size: 8px;
      margin: 2px 3px 0 0;
      text-shadow: 0 1px 1px rgba(0,0,0,0.4);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
    }

    @media (max-width: 480px) { .type-badge { font-size: 6.5px; padding: 2px 5px; } }

    .debug-info { display: none; white-space: pre-wrap; }

    .pokeball-row { display: flex; gap: 10px; }

    .mini-pokeball {
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(#d30000 50%, white 50%);
      border: 2px solid #000; position: relative;
      animation: bounce 0.6s ease-in-out infinite;
    }
    .mini-pokeball:nth-child(2) { animation-delay: 0.1s; }
    .mini-pokeball:nth-child(3) { animation-delay: 0.2s; }
    .mini-pokeball::before { content:""; position:absolute; top:50%; left:0; right:0; height:3px; background:black; transform:translateY(-50%);}
    .mini-pokeball::after { content:""; position:absolute; top:50%; left:50%; width:6px; height:6px; background:white; border:2px solid black; border-radius:50%; transform:translate(-50%,-50%);}

    @keyframes bounce { 0%{transform:translateY(0);} 50%{transform:translateY(-8px);} 100%{transform:translateY(0);} }

    /* ===== Scan Modal ===== */
    .scan-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 16px;
    }
    .scan-modal[hidden] { display: none; }

    .scan-modal-content {
      width: 100%;
      max-width: 380px;
      background: linear-gradient(155deg, var(--pd-red-hi), var(--pd-red) 60%, var(--pd-red-lo));
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      position: relative;
    }

    .scan-close {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 14px;
      min-height: unset;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2f2f2f;
      border-color: #111;
    }

    .scan-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 11px;
      color: #fff;
      text-align: center;
      margin-bottom: 12px;
      text-shadow: 0 2px 2px rgba(0,0,0,0.4);
    }

    .scan-video-wrap {
      background: var(--bezel);
      border-radius: 6px;
      border: 4px solid var(--bezel);
      box-shadow: 0 0 0 2px var(--bezel-hi), inset 0 2px 6px rgba(0,0,0,0.6);
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .scan-video-wrap video,
    .scan-video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scan-placeholder {
      color: #9fe89f;
      font-family: 'Press Start 2P', cursive;
      font-size: 9px;
      text-align: center;
      padding: 10px;
      line-height: 1.6;
    }

    .scan-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .scan-actions button { grid-column: span 1; }
    .scan-actions button.full { grid-column: 1 / -1; }

    .scan-status {
      margin-top: 10px;
      min-height: 18px;
      text-align: center;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      line-height: 1.6;
    }

    .scan-status.error { color: #ffd6d6; }
    .scan-status.ok { color: #d6ffd6; }

    .scan-spinner-row { display:flex; justify-content:center; margin-top: 6px; }
  </style>
</head>

<body>
  <div id="bootLoader">
    <div class="boot-pokeball"></div>
    <div class="boot-text">Initializing Pokédex...</div>
  </div>

  <div class="debug-info" id="debugPanel"></div>

  <div class="device-shell">
    <div class="hinge">
      <div class="hinge-rivet"></div>
      <div class="hinge-rivet"></div>
      <div class="hinge-rivet"></div>
      <div class="hinge-rivet"></div>
    </div>

    <div class="device-container">
      <div class="top-section">
        <div class="lens-wrap" id="lensWrap" title="Click to identify a Pokémon by photo">
          <div class="lens-ring"><div class="lens" id="lensEl"></div></div>
          <div class="lens-hint">SCAN</div>
        </div>
        <div class="status-col">
          <div class="led-indicators">
            <div class="led power" id="led1"></div>
            <div class="led" id="led2"></div>
            <div class="led" id="led3"></div>
          </div>
          <div class="speaker-grille">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div class="screen-container">
        <div class="screen-topbar">
          <span id="screenModeLabel">POKéDEX</span>
          <span class="no-tag" id="screenNoTag">NO. 001</span>
        </div>

        <div class="image-flip-container" id="flipContainer">
          <div class="image-front">
            <div class="pokemon-image-area">
              <div class="loading" id="loadingOverlay">
                <div class="pokeball-row">
                  <div class="mini-pokeball"></div>
                  <div class="mini-pokeball"></div>
                  <div class="mini-pokeball"></div>
                </div>
              </div>
              <img id="pokemonImage" class="pokemon-image" src="" alt="Pokémon" />
            </div>
          </div>

          <div class="image-back">
            <div class="details-section" id="detailsSection">
              <div class="detail-item"><span class="detail-label">ID:</span><span class="detail-value" id="idDetail">001</span></div>
              <div class="detail-item"><span class="detail-label">Name:</span><span class="detail-value" id="nameDetail">Bulbasaur</span></div>
              <div class="detail-item full"><span class="detail-label">Type:</span><span class="detail-value" id="typeDetail">-</span></div>
              <div class="detail-item full"><span class="detail-label">Abilities:</span><span class="detail-value" id="abilitiesDetail">-</span></div>
              <div class="detail-item"><span class="detail-label">Height:</span><span class="detail-value" id="heightDetail">-</span></div>
              <div class="detail-item"><span class="detail-label">Weight:</span><span class="detail-value" id="weightDetail">-</span></div>
              <div class="detail-item"><span class="detail-label">HP:</span><span class="detail-value" id="hpDetail">-</span></div>
              <div class="detail-item"><span class="detail-label">Attack:</span><span class="detail-value" id="attackDetail">-</span></div>
              <div class="detail-item"><span class="detail-label">Defense:</span><span class="detail-value" id="defenseDetail">-</span></div>
              <div class="detail-item"><span class="detail-label">Sp.Atk:</span><span class="detail-value" id="spatkDetail">-</span></div>
              <div class="detail-item"><span class="detail-label">Sp.Def:</span><span class="detail-value" id="spdefDetail">-</span></div>
              <div class="detail-item"><span class="detail-label">Speed:</span><span class="detail-value" id="speedDetail">-</span></div>
              <div class="detail-item full"><span class="detail-label">Entry:</span><span class="detail-value" id="entryDetail">-</span></div>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Pokémon" />
            <button id="searchBtn" type="button">Go</button>
          </div>

          <div class="button-row">
            <button id="scanBtn" type="button">📷 Scan</button>
            <button id="detailsBtn" type="button">Details</button>
            <button id="randomBtn" type="button">Random</button>
          </div>
          <div class="button-row dpad-row">
            <button id="prevBtn" type="button">◀ Prev</button>
            <button id="nextBtn" type="button">Next ▶</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Scan / Identify Modal ===== -->
  <div class="scan-modal" id="scanModal" hidden>
    <div class="scan-modal-content">
      <button class="scan-close" id="scanClose" type="button">✕</button>
      <div class="scan-title">Identify Pokémon</div>

      <div class="scan-video-wrap" id="scanVideoWrap">
        <video id="scanVideo" autoplay playsinline muted hidden></video>
        <img id="scanPreview" hidden alt="Captured photo" />
        <canvas id="scanCanvas" hidden></canvas>
        <div class="scan-placeholder" id="scanPlaceholder">Starting camera…</div>
      </div>

      <div class="scan-actions" id="scanActionsPrimary">
        <button id="scanCaptureBtn" type="button">Capture</button>
        <button id="scanUploadBtn" type="button">Upload Photo</button>
      </div>
      <div class="scan-actions" id="scanActionsPreview" hidden>
        <button id="scanRetakeBtn" type="button">Retake</button>
        <button id="scanConfirmBtn" type="button">Identify</button>
      </div>
      <input type="file" id="scanFileInput" accept="image/*" hidden />

      <div class="scan-status" id="scanStatus"></div>
    </div>
  </div>

  <script>
    const ACTION_DELAY_MS = 500;
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    const bootLoader = document.getElementById("bootLoader");
    window.addEventListener("load", () => {
      setTimeout(() => {
        bootLoader.style.opacity = "0";
        setTimeout(() => bootLoader.remove(), 1000);
      }, 1500);
    });

    let pokeAudio = null;
    let currentPokemonId = 1;
    let currentPokemonData = null;
    let pokemonDescriptions = {};
    let currentDescription = "";
    let descriptionRequestId = 0;
    const speciesCache = {};

    const API_BASE = "https://pokeapi.co/api/v2/pokemon/";

    // Photo identification runs a Pokémon image classifier (ViT, based on
    // imjeffhi/pokemon_classifier) entirely in the browser via Transformers.js 
    const MODEL_ID = "ash-ketchum-37884/pokemon-classifier-onnx";

    const imgEl = document.getElementById("pokemonImage");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const flipContainer = document.getElementById("flipContainer");
    const screenNoTag = document.getElementById("screenNoTag");
    const led2 = document.getElementById("led2");
    const led3 = document.getElementById("led3");

    const TYPE_COLORS = {
      normal:"var(--t-normal)", fire:"var(--t-fire)", water:"var(--t-water)", electric:"var(--t-electric)",
      grass:"var(--t-grass)", ice:"var(--t-ice)", fighting:"var(--t-fighting)", poison:"var(--t-poison)",
      ground:"var(--t-ground)", flying:"var(--t-flying)", psychic:"var(--t-psychic)", bug:"var(--t-bug)",
      rock:"var(--t-rock)", ghost:"var(--t-ghost)", dragon:"var(--t-dragon)", dark:"var(--t-dark)",
      steel:"var(--t-steel)", fairy:"var(--t-fairy)"
    };

    function debug(msg) {
      const panel = document.getElementById("debugPanel");
      const timestamp = new Date().toLocaleTimeString();
      panel.textContent += `[${timestamp}] ${msg}\n`;
      console.log(msg);
    }

    async function loadDescriptions() {
      try {
        const response = await fetch("pokedescription.json");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        pokemonDescriptions = await response.json();
        debug(`Fallback descriptions loaded: ${Object.keys(pokemonDescriptions).length} entries`);
      } catch (e) {
        debug(`Fallback descriptions not loaded (optional): ${e.message}`);
      }
    }

    function cleanFlavorText(raw) {
      return raw.replace(/[\n\f\r\t]+/g, " ").replace(/\s+/g, " ").trim();
    }

    // Live Pokédex entry text, fetched directly from PokeAPI's species
    // endpoint (the real in-game Pokédex descriptions). Falls back to the
    // bundled pokedescription.json, then a generic message, if the API
    // request fails or the entry is missing.
    async function fetchSpeciesEntry(data) {
      const idKey = String(data.id).padStart(3, "0");

      if (speciesCache[data.id]) return speciesCache[data.id];

      try {
        const speciesUrl = data.species?.url;
        if (speciesUrl) {
          const res = await fetch(speciesUrl);
          if (res.ok) {
            const species = await res.json();
            const enEntries = (species.flavor_text_entries || [])
              .filter(e => e.language?.name === "en");
            if (enEntries.length) {
              // Prefer the most recently listed English entry (tends to be
              // from a newer game), fall back to whichever is first.
              const chosen = enEntries[enEntries.length - 1] || enEntries[0];
              const text = cleanFlavorText(chosen.flavor_text);
              if (text) {
                speciesCache[data.id] = text;
                return text;
              }
            }
          } else {
            debug(`Species API HTTP ${res.status} for #${idKey}`);
          }
        }
      } catch (e) {
        debug(`Species fetch failed for #${idKey}: ${e.message}`);
      }

      const fallback = pokemonDescriptions[idKey];
      if (fallback) return fallback;

      return "No Pokédex entry available.";
    }

    function setEntryText(text) {
      document.getElementById("entryDetail").textContent = text;
    }

    async function loadEntryDescription(data) {
      const reqId = ++descriptionRequestId;
      currentDescription = "Loading entry…";
      setEntryText(currentDescription);

      const text = await fetchSpeciesEntry(data);

      if (reqId === descriptionRequestId) {
        currentDescription = text;
        setEntryText(text);
      }
    }

    function setLoading(isLoading) {
      loadingOverlay.style.display = isLoading ? "flex" : "none";
    }

    async function fetchPokemon(query) {
      try {
        setLoading(true);
        await sleep(ACTION_DELAY_MS);

        const safeQuery = String(query).trim().toLowerCase();
        const response = await fetch(`${API_BASE}${encodeURIComponent(safeQuery)}`);
        if (!response.ok) throw new Error(`API Error: ${response.status}`);

        const data = await response.json();
        currentPokemonId = data.id;
        currentPokemonData = data;

        flipContainer.classList.remove("flipped");
        updateUI(data);
        loadEntryDescription(data);

        return data;
      } catch (error) {
        debug(`ERROR: ${error.message}`);
        alert("The Pokédex has no data on that Pokémon.\nPlease check the name or ID and try again.");
        return null;
      } finally {
        setLoading(false);
      }
    }

    function normalizeShowdownName(name) {
      return name.toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function getCryCandidates(data) {
      const { id, name, cries } = data || {};
      const shortName = name && normalizeShowdownName(name);

      return [...new Set([
        shortName && `https://play.pokemonshowdown.com/audio/cries/${shortName}.ogg`,
        shortName && `https://play.pokemonshowdown.com/audio/cries/${shortName}.mp3`,
        cries?.latest,
        cries?.legacy,
        id && `https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${id}.ogg`,
        id && `https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/legacy/${id}.ogg`,
      ].filter(Boolean))];
    }

    function playPokemonSound(data) {
      const candidates = getCryCandidates(data);
      const speakerGrille = document.querySelector(".speaker-grille");

      if (!candidates.length) { debug("No cry source available for this Pokémon"); return; }
      if (pokeAudio) { pokeAudio.pause(); pokeAudio.currentTime = 0; }

      let idx = 0;
      const tryNext = () => {
        if (idx >= candidates.length) {
          debug("All cry sources failed for this Pokémon");
          speakerGrille?.classList.remove("active");
          return;
        }
        const url = candidates[idx++];
        pokeAudio = new Audio(url);
        pokeAudio.volume = 1.0;
        pokeAudio.onplay = () => speakerGrille?.classList.add("active");
        pokeAudio.onended = () => speakerGrille?.classList.remove("active");
        pokeAudio.onerror = () => { speakerGrille?.classList.remove("active"); tryNext(); };
        pokeAudio.play().catch(() => { speakerGrille?.classList.remove("active"); tryNext(); });
      };
      tryNext();
    }

    function speakDetails() {
      if (!currentPokemonData) return;
      if (!("speechSynthesis" in window)) { debug("Text-to-speech not supported in this browser"); return; }
      window.speechSynthesis.cancel();

      const id = String(currentPokemonData.id).padStart(3, "0");
      const name = currentPokemonData.name.charAt(0).toUpperCase() + currentPokemonData.name.slice(1);
      const description = currentDescription || pokemonDescriptions[id] || "No description available.";

      const text = `${name}. ${description}`;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;
      utterance.onstart = () => lensEl.classList.add("speaking");
      utterance.onend = () => lensEl.classList.remove("speaking");
      utterance.onerror = () => lensEl.classList.remove("speaking");
      window.speechSynthesis.speak(utterance);
    }

    function updateUI(data) {
      const id = String(data.id).padStart(3, "0");
      const name = data.name.charAt(0).toUpperCase() + data.name.slice(1);

      const imageUrl =
        data.sprites?.other?.["official-artwork"]?.front_default ||
        data.sprites?.front_default ||
        data.sprites?.front_shiny ||
        "";

      imgEl.onerror = () => {
        imgEl.onerror = null;
        const fallback = data.sprites?.front_default || data.sprites?.front_shiny || "";
        imgEl.src = fallback || "";
      };
      imgEl.src = imageUrl;

      screenNoTag.textContent = `NO. ${id}`;

      document.getElementById("idDetail").textContent = id;
      document.getElementById("nameDetail").textContent = name;

      const typeList = (data.types || []).map(t => t.type.name);
      const typeHtml = typeList.map(t => {
        const label = t.charAt(0).toUpperCase() + t.slice(1);
        const color = TYPE_COLORS[t] || "#888";
        return `<span class="type-badge" style="background:${color}">${label}</span>`;
      }).join("") || "-";
      document.getElementById("typeDetail").innerHTML = typeHtml;

      const abilities = (data.abilities || [])
        .map(a => a.ability.name.replace(/-/g, " "))
        .map(n => n.charAt(0).toUpperCase() + n.slice(1))
        .join(", ") || "-";
      document.getElementById("abilitiesDetail").textContent = abilities;

      document.getElementById("heightDetail").textContent = (data.height / 10).toFixed(1) + " m";
      document.getElementById("weightDetail").textContent = (data.weight / 10).toFixed(1) + " kg";

      const stats = data.stats || [];
      const getStat = (n) => stats.find(s => s.stat.name === n)?.base_stat ?? "-";
      document.getElementById("hpDetail").textContent = getStat("hp");
      document.getElementById("attackDetail").textContent = getStat("attack");
      document.getElementById("defenseDetail").textContent = getStat("defense");
      document.getElementById("spatkDetail").textContent = getStat("special-attack");
      document.getElementById("spdefDetail").textContent = getStat("special-defense");
      document.getElementById("speedDetail").textContent = getStat("speed");

      // Status LEDs reflect this Pokémon's type(s)
      const c1 = TYPE_COLORS[typeList[0]];
      const c2 = TYPE_COLORS[typeList[1]] || TYPE_COLORS[typeList[0]];
      led2.style.background = c1 ? `radial-gradient(circle at 30% 30%, #fff8, ${c1})` : "";
      led3.style.background = c2 ? `radial-gradient(circle at 30% 30%, #fff8, ${c2})` : "";
    }

    async function searchPokemon() {
      let value = document.getElementById("searchInput").value.trim().toLowerCase();
      if (!value) return;

      const defaultForms = {
        deoxys: "deoxys-normal",
        wormadam: "wormadam-plant",
        giratina: "giratina-altered",
        shaymin: "shaymin-land",
        basculin: "basculin-red-striped",
        darmanitan: "darmanitan-standard",
        tornadus: "tornadus-incarnate",
        thundurus: "thundurus-incarnate",
        landorus: "landorus-incarnate",
        enamorus: "enamorus-incarnate",
        urshifu: "urshifu-single-strike",
        indeedee: "indeedee-male",
        toxtricity: "toxtricity-amped",
      };

      value = defaultForms[value] || value;

      const data = await fetchPokemon(value);
      if (data) playPokemonSound(data);
    }

    async function previousPokemon() {
      if (currentPokemonId > 1) {
        currentPokemonId--;
        const data = await fetchPokemon(currentPokemonId);
        if (data) playPokemonSound(data);
      } else {
        alert("That's the first Pokémon—can't go back!");
      }
    }

    async function nextPokemon() {
      if (currentPokemonId < 1025) {
        currentPokemonId++;
        const data = await fetchPokemon(currentPokemonId);
        if (data) playPokemonSound(data);
      } else {
        alert("That's the last Pokémon—can't go forward!");
      }
    }

    async function randomPokemon() {
      const max = 1025;
      currentPokemonId = Math.floor(Math.random() * max) + 1;
      const data = await fetchPokemon(currentPokemonId);
      if (data) playPokemonSound(data);
    }

    function toggleDetails() {
      const isFlippingToBack = !flipContainer.classList.contains("flipped");
      flipContainer.classList.toggle("flipped");
      if (isFlippingToBack) {
        setTimeout(() => speakDetails(), 300);
      } else if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
        lensEl.classList.remove("speaking");
      }
    }

    document.getElementById("searchBtn").addEventListener("click", searchPokemon);
    document.getElementById("prevBtn").addEventListener("click", previousPokemon);
    document.getElementById("nextBtn").addEventListener("click", nextPokemon);
    document.getElementById("randomBtn").addEventListener("click", randomPokemon);
    document.getElementById("detailsBtn").addEventListener("click", toggleDetails);

    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchPokemon();
    });

    /* =========================================================
       Photo Identification ("Scan" feature)
       Click the lens or the Scan button to identify a Pokémon
       from a photo, using camera capture or file upload.
       ========================================================= */
    const scanModal = document.getElementById("scanModal");
    const scanVideo = document.getElementById("scanVideo");
    const scanPreview = document.getElementById("scanPreview");
    const scanCanvas = document.getElementById("scanCanvas");
    const scanPlaceholder = document.getElementById("scanPlaceholder");
    const scanStatus = document.getElementById("scanStatus");
    const scanActionsPrimary = document.getElementById("scanActionsPrimary");
    const scanActionsPreview = document.getElementById("scanActionsPreview");
    const scanCaptureBtn = document.getElementById("scanCaptureBtn");
    const scanUploadBtn = document.getElementById("scanUploadBtn");
    const scanFileInput = document.getElementById("scanFileInput");
    const scanRetakeBtn = document.getElementById("scanRetakeBtn");
    const scanConfirmBtn = document.getElementById("scanConfirmBtn");
    const lensEl = document.getElementById("lensEl");

    let mediaStream = null;
    let capturedDataUrl = null;

    function setScanStatus(msg, kind) {
      scanStatus.textContent = msg || "";
      scanStatus.className = "scan-status" + (kind ? ` ${kind}` : "");
    }

    async function openScanModal() {
      scanModal.hidden = false;
      capturedDataUrl = null;
      scanPreview.hidden = true;
      scanVideo.hidden = true;
      scanPlaceholder.hidden = false;
      scanPlaceholder.textContent = "Starting camera…";
      scanActionsPrimary.hidden = false;
      scanActionsPreview.hidden = true;
      setScanStatus("");
      await startCamera();
    }

    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        scanPlaceholder.textContent = "Camera not available.\nUse Upload Photo instead.";
        scanCaptureBtn.disabled = true;
        return;
      }
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        scanVideo.srcObject = mediaStream;
        scanVideo.hidden = false;
        scanPlaceholder.hidden = true;
        scanCaptureBtn.disabled = false;
      } catch (e) {
        debug(`Camera error: ${e.message}`);
        scanPlaceholder.hidden = false;
        scanPlaceholder.textContent = "Camera unavailable.\nUse Upload Photo instead.";
        scanCaptureBtn.disabled = true;
      }
    }

    function stopCamera() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
    }

    function closeScanModal() {
      stopCamera();
      scanModal.hidden = true;
      lensEl.classList.remove("scanning");
      if ("speechSynthesis" in window) { /* no-op, keep TTS untouched */ }
    }

    function showPreview(dataUrl) {
      capturedDataUrl = dataUrl;
      scanPreview.src = dataUrl;
      scanPreview.hidden = false;
      scanVideo.hidden = true;
      scanPlaceholder.hidden = true;
      scanActionsPrimary.hidden = true;
      scanActionsPreview.hidden = false;
      setScanStatus("");
    }

    scanCaptureBtn.addEventListener("click", () => {
      if (!mediaStream) return;
      const w = scanVideo.videoWidth || 640;
      const h = scanVideo.videoHeight || 480;
      scanCanvas.width = w;
      scanCanvas.height = h;
      const ctx = scanCanvas.getContext("2d");
      ctx.drawImage(scanVideo, 0, 0, w, h);
      const dataUrl = scanCanvas.toDataURL("image/jpeg", 0.9);
      stopCamera();
      showPreview(dataUrl);
    });

    scanUploadBtn.addEventListener("click", () => scanFileInput.click());

    scanFileInput.addEventListener("change", () => {
      const file = scanFileInput.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        stopCamera();
        showPreview(reader.result);
      };
      reader.readAsDataURL(file);
    });

    scanRetakeBtn.addEventListener("click", async () => {
      capturedDataUrl = null;
      scanPreview.hidden = true;
      scanActionsPrimary.hidden = false;
      scanActionsPreview.hidden = true;
      setScanStatus("");
      scanFileInput.value = "";
      await startCamera();
    });

    document.getElementById("scanClose").addEventListener("click", closeScanModal);
    document.getElementById("lensWrap").addEventListener("click", openScanModal);
    document.getElementById("scanBtn").addEventListener("click", openScanModal);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !scanModal.hidden) closeScanModal();
    });

    // The classifier pipeline is loaded once and reused. First call
    // downloads the ONNX model (browser caches it after that).
    let classifierPromise = null;
    function getClassifier() {
      if (!classifierPromise) {
        classifierPromise = (async () => {
          const { pipeline } = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@4");
          return pipeline("image-classification", MODEL_ID, {
            dtype: "fp32",
            progress_callback: (p) => {
              if (p.status === "progress" && typeof p.progress === "number") {
                setScanStatus(`Downloading model… ${Math.round(p.progress)}%`);
              } else if (p.status === "ready" || p.status === "done") {
                setScanStatus("Model ready. Analyzing…");
              }
            },
          });
        })();
      }
      return classifierPromise;
    }

    function slugifyPokemonLabel(label) {
      let s = String(label).trim().toLowerCase();
      s = s.replace(/[’]/g, "'").replace(/♀/g, "-f").replace(/♂/g, "-m");
      s = s.replace(/[.']/g, "");
      s = s.replace(/[\s_]+/g, "-");
      s = s.replace(/[^a-z0-9-]/g, "");
      return s;
    }

    async function identifyPokemonImage(dataUrl) {
      setScanStatus("Loading model…");
      const classifier = await getClassifier();

      const blob = await (await fetch(dataUrl)).blob();
      const objectUrl = URL.createObjectURL(blob);
      try {
        setScanStatus("Analyzing image…");
        const output = await classifier(objectUrl, { topk: 1 });
        const top = Array.isArray(output) ? output[0] : output;
        return slugifyPokemonLabel(top?.label || "");
      } finally {
        URL.revokeObjectURL(objectUrl);
      }
    }

    scanConfirmBtn.addEventListener("click", async () => {
      if (!capturedDataUrl) return;
      lensEl.classList.add("scanning");
      setScanStatus("Analyzing image…");
      scanConfirmBtn.disabled = true;
      scanRetakeBtn.disabled = true;
      try {
        const guess = await identifyPokemonImage(capturedDataUrl);
        if (!guess || guess === "unknown") {
          setScanStatus("Couldn't identify a Pokémon in that photo. Try again?", "error");
        } else {
          setScanStatus(`Detected: ${guess.replace(/-/g, " ")}`, "ok");
          const result = await fetchPokemon(guess);
          if (result) {
            playPokemonSound(result);
            await sleep(500);
            closeScanModal();
          } else {
            setScanStatus(`Identified "${guess}" but couldn't find it in the Pokédex. Try again?`, "error");
          }
        }
      } catch (e) {
        debug(`Identify error: ${e.message}`);
        setScanStatus(`Identification failed: ${e.message}`, "error");
      } finally {
        lensEl.classList.remove("scanning");
        scanConfirmBtn.disabled = false;
        scanRetakeBtn.disabled = false;
      }
    });

    loadDescriptions();
    fetchPokemon(1);
  </script>
</body>
</html>
